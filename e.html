<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINA | Premium Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #111111;
            --accent: #ff4757;
            --bg: #ffffff;
            --light-gray: #f6f6f6;
            --text-muted: #777777;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            position: fixed;
            width: 100%;
            top: 0;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid #eee;
        }

        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: 2px; }

        .cart-icon {
            cursor: pointer;
            position: relative;
            font-weight: 600;
        }

        #cart-count {
            background: var(--accent);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50%;
            position: absolute;
            top: -10px;
            right: -15px;
        }

        /* Hero Section */
        .hero {
            height: 80vh;
            background: var(--light-gray);
            display: flex;
            align-items: center;
            padding: 0 10%;
            margin-top: 70px;
        }

        .hero-text h1 { font-size: 4rem; line-height: 1.1; margin-bottom: 1.5rem; }
        .hero-text p { color: var(--text-muted); margin-bottom: 2rem; max-width: 400px; }

        /* Product Grid */
        .container { padding: 5rem 5%; }
        .section-title { margin-bottom: 3rem; font-size: 2rem; text-align: center; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--white);
            transition: var(--transition);
            position: relative;
        }

        .product-image {
            width: 100%;
            height: 350px;
            background: #eee;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .product-info h3 { font-size: 1.1rem; margin-bottom: 0.5rem; }
        .price { font-weight: 600; color: var(--accent); }

        .add-to-cart {
            margin-top: 1rem;
            width: 100%;
            padding: 0.8rem;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            transition: var(--transition);
        }

        .add-to-cart:hover { background: #333; }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 350px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            z-index: 2000;
            padding: 2rem;
            transition: var(--transition);
        }

        .cart-sidebar.active { right: 0; }
        .close-cart { cursor: pointer; float: right; font-weight: bold; }
        .cart-items { margin-top: 2rem; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 1rem; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; }

    </style>
</head>
<body>

    <nav>
        <div class="logo">LUMINA</div>
        <div class="cart-icon" onclick="toggleCart()">
            CART (<span id="cart-count">0</span>)
        </div>
    </nav>

    <section class="hero">
        <div class="hero-text">
            <h1>New Season <br> Essentials.</h1>
            <p>Experience the blend of minimalist design and premium quality in our latest collection.</p>
            <button class="add-to-cart" style="width: auto; padding: 1rem 2.5rem;">Shop Now</button>
        </div>
    </section>

    <div class="container">
        <h2 class="section-title">Featured Products</h2>
        <div class="product-grid" id="product-list">
            </div>
    </div>

    <div class="cart-sidebar" id="cart-sidebar">
        <span class="close-cart" onclick="toggleCart()">CLOSE</span>
        <h2>Your Cart</h2>
        <div class="cart-items" id="cart-items">
            </div>
        <div id="cart-total" style="margin-top: 2rem; font-weight: 800; font-size: 1.2rem;">
            Total: $0.00
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Minimalist Watch", price: 120, img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" },
            { id: 2, name: "Leather Backpack", price: 85, img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=500" },
            { id: 3, name: "Wireless Headphones", price: 210, img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500" },
            { id: 4, name: "Smart Speaker", price: 150, img: "https://images.unsplash.com/photo-1589492477829-5e65395b66cc?w=500" }
        ];

        let cart = [];

        // Render Products
        function renderProducts() {
            const productList = document.getElementById('product-list');
            productList.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.img}" class="product-image" alt="${p.name}">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p class="price">$${p.price}</p>
                        <button class="add-to-cart" onclick="addToCart(${p.id})">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        // Cart Functions
        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('active');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCart();
        }

        function updateCart() {
            const cartItems = document.getElementById('cart-items');
            const cartCount = document.getElementById('cart-count');
            const cartTotal = document.getElementById('cart-total');

            cartCount.innerText = cart.length;
            
            cartItems.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <span>${item.name}</span>
                    <span>$${item.price}</span>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            cartTotal.innerText = `Total: $${total.toFixed(2)}`;
        }

        renderProducts();
    </script>
</body>
</html>
